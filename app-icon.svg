<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6c5ce7"/>
      <stop offset="1" stop-color="#a29bfe"/>
    </linearGradient>
    <radialGradient id="disc" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#16181f"/>
      <stop offset="1" stop-color="#0a0b0e"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="112" fill="#15171e"/>
  <rect width="512" height="512" rx="112" fill="url(#bg)" opacity="0.12"/>

  <!-- vinyl disc -->
  <circle cx="256" cy="256" r="170" fill="url(#disc)" stroke="#2a2e3a" stroke-width="3"/>
  <g fill="none" stroke="#23262f" stroke-width="3">
    <circle cx="256" cy="256" r="150"/>
    <circle cx="256" cy="256" r="132"/>
    <circle cx="256" cy="256" r="114"/>
    <circle cx="256" cy="256" r="96"/>
  </g>

  <!-- label -->
  <circle cx="256" cy="256" r="62" fill="url(#bg)"/>

  <!-- music note -->
  <g fill="#ffffff" transform="translate(238,222)">
    <rect x="22" y="2" width="7" height="46" rx="3"/>
    <ellipse cx="14" cy="50" rx="14" ry="10"/>
    <path d="M29 4 q14 2 14 14 v6 q-6 -10 -14 -10 z"/>
  </g>

  <!-- center hole -->
  <circle cx="256" cy="256" r="7" fill="#0a0b0e"/>
</svg>
