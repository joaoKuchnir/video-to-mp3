name: Build (Windows)

# Builds Windows installer. Triggers on v* tag (publishes draft Release) or
# manual dispatch (uploads artifact). Other platforms intentionally disabled —
# re-add aarch64-apple-darwin / x86_64-apple-darwin / x86_64-unknown-linux-gnu
# entries to the matrix when bringing them back.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cargo cache keyed on target so different triples don't fight.
      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      # Sidecars are ~150MB and don't change between runs — cache by script hash.
      - name: Cache sidecars
        id: cache-sidecars
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries
          key: sidecars-${{ matrix.target }}-${{ hashFiles('scripts/fetch-sidecars.ps1') }}

      - name: Install frontend deps
        run: npm ci

      - name: Fetch sidecar binaries (Windows)
        if: steps.cache-sidecars.outputs.cache-hit != 'true'
        run: powershell -ExecutionPolicy Bypass -File scripts/fetch-sidecars.ps1

      - name: Build app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Video → MP3 ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: video-mp3-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*
            src-tauri/target/release/bundle/**/*
          if-no-files-found: ignore
